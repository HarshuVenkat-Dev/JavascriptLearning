<html>
    <head>
        <meta charSet="UTF-8"></meta>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
        <title>Booksky</title>
        <link rel="stylesheet" href="style.css"></link>
        <link rel="preconnect" href="https://fonts.googleapis.com"></link>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin></link>
        <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet"></link>
    </head>
    <body>
        <div class="navbar">
            <h1>Booksky</h1>
        </div>
        <div class="container">
            <div class="book-container">
                <h2>Rich dad poor dad</h2>
                <h5>Robert</h5>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Excepturi corporis consequatur similique amet repellat totam deserunt dicta, praesentium nulla aut voluptatum sed esse porro a doloribus omnis quod, temporibus architecto!</p>
                <button onclick="deletebook(event)">Delete</button>
            </div>
            <div class="popup-overlay"></div>
            <div class="popup-box">
                <h2>Add book</h2>
                <form>
                    <input type="text" placeholder="booktitle" id="book-title-input">
                    <input type="text" placeholder="bookauthor" id="book-author-input">
                    <textarea placeholder="short description" id="book-description-input"></textarea>
                    <button id="addbook">Add</button>
                    <button id="cancel-popup">Cancel</button>
                </form>
            </div>
            <button class="add-btn" id="add-popup-button">+</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
